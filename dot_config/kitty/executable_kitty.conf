include dank-tabs.conf
include dank-theme.conf
window_padding_width 5
hide_window_decorations yes
background_opacity 0.8
# font_family JetBrains Maple Mono 
font_size 13.5
remember_window_size no
confirm_os_window_close 0
shell fish
cursor_trail 1 
cursor_shape block
shell_integration no-cursor

# BEGIN NNN PREVIEW
# Allow preview-tui to create a secure split in this Kitty instance. Kitty
# appends its PID to the abstract socket, so multiple instances do not clash.
allow_remote_control socket-only
listen_on unix:@kitty-nnn
# END NNN PREVIEW



# BEGIN_KITTY_FONTS
font_family      family="Maple Mono NF CN"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# Open Kitty scrollback in an isolated Neovim terminal buffer. The wrapper
# uses a private temporary file and removes it when Neovim exits.
scrollback_pager ~/.local/bin/kitty-scrollback-nvim
map ctrl+shift+h show_scrollback
