"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
[ ](bg:#33312f)\
$os\
[ ](bg:#33312f)\
$username\
$directory\
$git_branch\
$git_status\
$c\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
$conda\
$time\
$cmd_duration\
$line_break\
$character"""

palette = 'catppuccin_mocha'

[os]
disabled = false
style = "bg:#33312F fg:#efe4d0"

[os.symbols]
Windows = ""
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
style_user = "bg:#3d3837 fg:#efe4d0"
style_root = "bg:#3d3837 fg:#efe4d0"
format = '[ $user ]($style)'

[directory]
format = "[ $path ]($style)"
style = "fg:#efe4d0 bg:#504946"
truncation_length = 4
truncate_to_repo = true
read_only = ""

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

# ==============================================================================
# Git 分支 + 状态
# ==============================================================================
# 不在 git 仓库时自动隐藏
[git_branch]
symbol = ""
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format     = "($ahead_behind$staged$modified$untracked$deleted$conflicted)"
ahead      = "[⇡$count ](bold cyan)"
behind     = "[⇣$count ](bold cyan)"
diverged   = "[⇡$ahead_count⇣$behind_count ](bold cyan)"
staged     = "[+$count ](bold green)"
modified   = "[●$count ](bold yellow)"
untracked  = "[?$count ](bold white)"
deleted    = "[✘$count ](bold red)"
conflicted = "[⚡$count ](bold red)"

# ==============================================================================
# 语言版本
# ==============================================================================
# 仅在检测到对应项目时才显示（如 package.json → nodejs，go.mod → golang）
[nodejs]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[bun]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = " "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = " "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

# ==============================================================================
# Docker 上下文（蓝宝石色块）
# ==============================================================================
# 仅在 Docker 上下文非默认时显示
[docker_context]
symbol = ""
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'

# ==============================================================================
# Conda 环境
# ==============================================================================
[conda]
symbol = "  "
style = "fg:crust bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

# ==============================================================================
# 时间
# ==============================================================================
[time]
disabled = true
time_format = "%R"
style = "bg:lavender"
format = '[[  $time ](fg:crust bg:lavender)]($style)'

# ==============================================================================
# 换行（彩虹条和输入符号分两行显示）
# ==============================================================================
# disabled = false: 彩虹条一行，输入在下一行，更宽敞
# disabled = true: 单行显示（官方默认）
[line_break]
disabled = true

# ==============================================================================
# 输入符号（彩虹条下方）
# ==============================================================================
# 命令成功绿色 ❯，失败红色 ❯
# 支持 vim 模式：普通模式 ❮，替换模式紫色，可视模式黄色
[character]
disabled = false
success_symbol = '[ ❯](bold fg:green)'
error_symbol = '[ ❯](bold fg:red)'
vimcmd_symbol = '[ ❮](bold fg:green)'
vimcmd_replace_one_symbol = '[ ❮](bold fg:lavender)'
vimcmd_replace_symbol = '[ ❮](bold fg:lavender)'
vimcmd_visual_symbol = '[ ❮](bold fg:yellow)'

# ==============================================================================
# 命令耗时（显示在彩虹条末尾）
# ==============================================================================
# min_time_to_notify: 命令超过 45 秒时发送系统通知
[cmd_duration]
show_milliseconds = true
format = " in $duration "
style = "bg:lavender"
disabled = true
show_notifications = true
min_time_to_notify = 45000

